<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hafiz Muhammad Faizan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B1114;
    --paper:#F5F7F7;
    --brand:#10202B;
    --signal:#17B8A6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    text-align:center;
    padding:24px;
  }
  .wrap{max-width:520px;}
  .mark{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:44px;
    color:var(--brand);
    margin-bottom:18px;
  }
  .mark .bracket{color:var(--signal);}
  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:26px;
    margin:0 0 12px;
  }
  p.claim{
    font-family:'Inter', sans-serif;
    font-size:15px;
    opacity:.7;
    margin:0 0 28px;
  }
  .status{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--signal);
    border:1px solid rgba(23,184,166,0.35);
    padding:8px 14px;
    border-radius:20px;
  }
  .status .dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--signal);
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark"><span class="bracket">&lt;</span>HMF<span class="bracket">/&gt;</span></div>
    <h1>Hafiz Muhammad Faizan</h1>
    <p class="claim">I build AI that ships — real agents and automations, not demos.</p>
    <div class="status"><span class="dot"></span>Building in public — case studies coming soon</div>
  </div>
</body>
</html>
